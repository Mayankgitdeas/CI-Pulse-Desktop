services:
  - type: web
    name: cognizant-ci-pulse
    runtime: python
    pythonVersion: "3.13"
    buildCommand: "pip install -r requirements.txt && (playwright install chromium || echo 'Playwright browser install skipped')"
    startCommand: "python main.py"
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cipulse-db
          property: connectionString

databases:
  - name: cipulse-db
    plan: free

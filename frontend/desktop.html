<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognizant CI Pulse</title>
<style>
:root{--navy:#0D1243;--blue:#0057B8;--teal:#00B5B8;--bg:#F1F5F9;--border:#E2E8F0;--text:#0F172A;--text-dim:#64748B;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font:13px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);}

/* Sticky header */
.header{background:linear-gradient(135deg,#0D1243 0%,#1a2155 100%);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(13,18,67,0.25);}
.cog-logo{height:30px;width:auto;}
.header-divider{width:1px;height:28px;background:rgba(255,255,255,0.2);}
.radar{width:38px;height:38px;position:relative;border-radius:50%;background:radial-gradient(circle,rgba(0,181,184,0.15) 0%,rgba(13,18,67,0.4) 70%);border:1.5px solid rgba(0,181,184,0.4);overflow:hidden;flex-shrink:0;}
.radar::before{content:'';position:absolute;inset:0;background:
  repeating-radial-gradient(circle at center,transparent 0,transparent 6px,rgba(0,181,184,0.15) 6px,rgba(0,181,184,0.15) 7px);}
.radar::after{content:'';position:absolute;top:50%;left:50%;width:50%;height:50%;transform-origin:top left;background:conic-gradient(from 0deg,rgba(0,229,232,0.7) 0deg,rgba(0,181,184,0.25) 30deg,transparent 60deg);animation:sweep 2.5s linear infinite;}
@keyframes sweep{to{transform:rotate(360deg);}}
.radar-blip{position:absolute;width:4px;height:4px;background:#00E5E8;border-radius:50%;box-shadow:0 0 6px #00E5E8;animation:blip 2.5s ease-in-out infinite;}
.radar-blip:nth-child(1){top:28%;left:62%;animation-delay:0.3s;}
.radar-blip:nth-child(2){top:60%;left:35%;animation-delay:1.2s;}
.radar-blip:nth-child(3){top:45%;left:70%;animation-delay:2s;}
@keyframes blip{0%,100%{opacity:0;}40%{opacity:1;}}
.header-title{font-size:18px;font-weight:600;flex:1;letter-spacing:-0.2px;}
.header-title small{display:block;font-size:11px;font-weight:400;opacity:0.7;margin-top:1px;}
.header-links{display:flex;gap:8px;}
.header-link{color:#fff;text-decoration:none;font-size:12px;opacity:0.9;padding:7px 13px;border-radius:7px;background:rgba(255,255,255,0.1);transition:all 0.2s;border:1px solid transparent;}
.header-link:hover{opacity:1;background:rgba(255,255,255,0.18);border-color:rgba(0,181,184,0.4);transform:translateY(-1px);}

/* Sticky toolbar */
.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:66px;z-index:90;box-shadow:0 1px 4px rgba(0,0,0,0.03);}
.toolbar select,.search-box{padding:7px 11px;border:1px solid var(--border);border-radius:7px;font-size:12px;background:#fff;transition:border-color 0.2s,box-shadow 0.2s;}
.toolbar select:focus,.search-box:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,87,184,0.1);}
.toolbar select{min-width:135px;cursor:pointer;}
.search-box{min-width:200px;}
.toolbar-right{margin-left:auto;display:flex;gap:10px;align-items:center;}
.stat-pill{font-size:12px;color:var(--text-dim);background:var(--bg);padding:6px 12px;border-radius:20px;}
.stat-pill b{color:var(--navy);font-weight:700;}
.export-section{display:flex;align-items:center;gap:8px;}
.export-section input{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;width:180px;}
.export-btn{background:linear-gradient(135deg,#00B5B8,#0097A0);color:#fff;border:none;padding:8px 18px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 6px rgba(0,181,184,0.3);}
.export-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,181,184,0.4);}
.export-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}

.container{padding:20px 24px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px;}

/* Cards with hover animation */
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;transition:transform 0.18s cubic-bezier(.2,.8,.2,1),box-shadow 0.18s,border-color 0.18s;cursor:pointer;animation:cardIn 0.4s ease backwards;}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(13,18,67,0.12);border-color:var(--blue);}
.card.selected{border-color:var(--teal);box-shadow:0 0 0 2px rgba(0,181,184,0.2);}
@keyframes cardIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.card-check{position:absolute;top:14px;right:14px;width:18px;height:18px;cursor:pointer;accent-color:var(--teal);z-index:2;}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:9px;padding-right:28px;}
.comp-badge{padding:4px 11px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;}
.card-date{font-size:10px;color:var(--text-dim);}
.priority-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.card-headline{font-weight:600;font-size:14px;line-height:1.38;margin-bottom:7px;color:var(--navy);}
.card-desc{font-size:11.5px;color:var(--text-dim);line-height:1.5;margin-bottom:10px;max-height:0;overflow:hidden;opacity:0;transition:max-height 0.3s ease,opacity 0.3s ease,margin 0.3s ease;}
.card.expanded .card-desc{max-height:300px;opacity:1;margin-bottom:10px;}
.card-desc.always{max-height:60px;opacity:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px;}
.tag{padding:3px 9px;border-radius:5px;font-size:10px;font-weight:500;transition:transform 0.15s;}
.tag:hover{transform:scale(1.05);}
.industry-tag{background:#E6F1FB;color:#0C447C;}
.topic-tag{background:#F1F5F9;color:#475569;}
.impact-badge{padding:3px 10px;border-radius:5px;font-size:10px;font-weight:700;text-transform:uppercase;margin-left:auto;}
.impact-hi{background:#FEE2E2;color:#B91C1C;}
.impact-med{background:#FEF3C7;color:#B45309;}
.impact-lo{background:#D1FAE5;color:#047857;}
.analyst-review{background:linear-gradient(135deg,#F8FAFC,#F1F5F9);border-left:3px solid var(--teal);padding:9px 11px;margin:9px 0;font-size:11px;line-height:1.55;color:#334155;border-radius:0 6px 6px 0;}
.analyst-review.empty{font-style:italic;color:#94A3B8;border-left-color:#CBD5E1;}
.knowhub-link{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:11px;color:#0369A1;text-decoration:none;font-weight:500;padding:4px 0;transition:gap 0.2s;}
.knowhub-link:hover{gap:7px;text-decoration:underline;}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:10px;color:var(--text-dim);}
.expand-hint{font-size:10px;color:#94A3B8;text-align:center;margin-top:4px;}

/* Loading skeleton */
.skeleton{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;}
.skeleton-line{height:12px;background:linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px;margin-bottom:8px;}
@keyframes shimmer{to{background-position:-200% 0;}}
.empty{padding:80px 20px;text-align:center;color:var(--text-dim);font-size:14px;grid-column:1/-1;}
</style>
</head>
<body>

<div class="header">
  <img class="cog-logo" src="/assets/cognizant-logo-white.png" alt="Cognizant" />
  <div class="header-divider"></div>
  <div class="radar"><span class="radar-blip"></span><span class="radar-blip"></span><span class="radar-blip"></span></div>
  <div class="header-title">CI Pulse<small>Competitive Intelligence</small></div>
  <div class="header-links">
    <a href="/admin" class="header-link">Admin</a>
    <a href="/admin" class="header-link">Sources</a>
    <a href="/admin" class="header-link">KnowHub</a>
  </div>
</div>

<div class="toolbar">
  <input type="text" class="search-box" id="search-box" placeholder="🔍 Search signals..." oninput="applyFilters()" />
  <select id="comp-filter" onchange="applyFilters()"><option value="">All competitors</option></select>
  <select id="industry-filter" onchange="applyFilters()"><option value="">All industries</option></select>
  <select id="topic-filter" onchange="applyFilters()"><option value="">All topics</option></select>
  <select id="date-filter" onchange="applyFilters()">
    <option value="30">Last 30 days</option>
    <option value="7">Last 7 days</option>
    <option value="14">Last 14 days</option>
    <option value="90">Last 90 days</option>
  </select>
  <select id="sort-filter" onchange="applyFilters()">
    <option value="date">Newest first</option>
    <option value="date-asc">Oldest first</option>
    <option value="competitor">By competitor</option>
    <option value="impact">By impact</option>
  </select>
  <div class="toolbar-right">
    <span class="stat-pill"><b id="signal-count">0</b> signals · <b id="selected-count">0</b> selected</span>
    <div class="export-section">
      <input type="text" id="pdf-filename" placeholder="Filename (optional)" />
      <button class="export-btn" id="export-btn" onclick="exportPDF()" disabled>Export PDF</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="grid" id="grid"></div>
</div>

<script>
let allSignals=[],selectedIds=new Set(),taxonomy={industries:[],all_topics:[]};
const COMPETITORS=['Accenture','TCS','Infosys','Wipro','HCL Technologies','IBM','Deloitte','Capgemini','Tech Mahindra','Globant','Genpact','DXC Technology'];
const COMP_COLORS={
  'Accenture':['#EEEDFE','#3C3489'],'TCS':['#E6F1FB','#0C447C'],'Infosys':['#E1F5EE','#085041'],
  'Wipro':['#FBEAF0','#72243E'],'HCL Technologies':['#FAEEDA','#633806'],'IBM':['#E6F1FB','#0530AD'],
  'Deloitte':['#EAF3DE','#27500A'],'Capgemini':['#E1F5EE','#0a6e7a'],'Tech Mahindra':['#FAEEDA','#9a3412'],
  'Globant':['#FBEAF0','#9d174d'],'Genpact':['#E1F5EE','#065f46'],'DXC Technology':['#F1EFE8','#444441'],
  'Generic':['#F1F5F9','#475569'],'Technology':['#E6F1FB','#0C447C']
};

// Show loading skeletons
function showSkeletons(){
  const grid=document.getElementById('grid');
  grid.innerHTML=Array(6).fill(0).map(()=>`<div class="skeleton"><div class="skeleton-line" style="width:40%"></div><div class="skeleton-line" style="width:90%"></div><div class="skeleton-line" style="width:75%"></div><div class="skeleton-line" style="width:60%"></div></div>`).join('');
}
showSkeletons();

fetch('/api/taxonomy').then(r=>r.json()).then(tax=>{taxonomy=tax;}).catch(()=>{});

fetch('/api/signals?days=90').then(r=>r.json()).then(data=>{
  allSignals=data;
  document.getElementById('comp-filter').innerHTML='<option value="">All competitors</option>'+COMPETITORS.map(c=>`<option value="${c}">${c}</option>`).join('');
  buildDataDrivenFilters();
  renderGrid();
}).catch(e=>{
  document.getElementById('grid').innerHTML='<div class="empty">Error loading signals: '+e.message+'</div>';
});

function buildDataDrivenFilters(){
  const baseInd=taxonomy.industries||['BFSI','Healthcare','Manufacturing','Retail & CPG','Insurance','Telecom','Energy & Utilities','Public Sector','Communications & Media','Life Sciences','Travel & Hospitality','Cross-industry'];
  const baseTop=taxonomy.all_topics||['AI & GenAI','Cloud','Data & Analytics','Cybersecurity','Sustainability','Quantum','Edge / IoT','Platform / SaaS','Contract win','Partnership','M&A','Leadership change','Product launch','Earnings','Layoff / restructure','Regulatory','IP / patent','Investment / funding','Strategy / direction'];
  const industries=new Set(baseInd),topics=new Set(baseTop);
  allSignals.forEach(s=>{if(s.industry)industries.add(s.industry);(s.topics||[]).forEach(t=>topics.add(t));});
  document.getElementById('industry-filter').innerHTML='<option value="">All industries</option>'+Array.from(industries).sort().map(i=>`<option value="${esc(i)}">${esc(i)}</option>`).join('');
  document.getElementById('topic-filter').innerHTML='<option value="">All topics</option>'+Array.from(topics).sort().map(t=>`<option value="${esc(t)}">${esc(t)}</option>`).join('');
}

let debounceTimer;
function applyFilters(){clearTimeout(debounceTimer);debounceTimer=setTimeout(renderGrid,150);}

function renderGrid(){
  const search=document.getElementById('search-box').value.toLowerCase().trim();
  const comp=document.getElementById('comp-filter').value;
  const industry=document.getElementById('industry-filter').value;
  const topic=document.getElementById('topic-filter').value;
  const days=parseInt(document.getElementById('date-filter').value);
  const sort=document.getElementById('sort-filter').value;
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);

  let filtered=allSignals.filter(s=>{
    if(new Date(s.published_at)<cutoff)return false;
    if(comp&&s.competitor!==comp)return false;
    if(industry&&s.industry!==industry)return false;
    if(topic&&!(s.topics||[]).includes(topic))return false;
    if(search){
      const hay=((s.headline||'')+' '+(s.description||'')+' '+(s.competitor||'')+' '+(s.analyst_review||'')).toLowerCase();
      if(!hay.includes(search))return false;
    }
    return true;
  });

  // Sort
  const impactRank={hi:3,med:2,lo:1};
  filtered.sort((a,b)=>{
    if(sort==='date')return new Date(b.published_at)-new Date(a.published_at);
    if(sort==='date-asc')return new Date(a.published_at)-new Date(b.published_at);
    if(sort==='competitor')return (a.competitor||'').localeCompare(b.competitor||'');
    if(sort==='impact')return (impactRank[b.impact]||0)-(impactRank[a.impact]||0);
    return 0;
  });

  animateCount('signal-count',filtered.length);
  document.getElementById('selected-count').textContent=selectedIds.size;
  document.getElementById('export-btn').disabled=selectedIds.size===0;

  const grid=document.getElementById('grid');
  if(!filtered.length){grid.innerHTML='<div class="empty">No signals match your filters</div>';return;}

  grid.innerHTML=filtered.map((s,i)=>{
    const date=fmtDate(s.published_at);
    const impactClass={hi:'impact-hi',med:'impact-med',lo:'impact-lo'}[s.impact]||'impact-med';
    const impactLabel={hi:'HIGH',med:'MED',lo:'LOW'}[s.impact]||'MED';
    const [bg,fg]=COMP_COLORS[s.competitor]||['#F1F5F9','#475569'];
    const pColor=s.source_priority===2?'#B45309':'#0057B8';
    const review=s.analyst_review?`<div class="analyst-review">${esc(s.analyst_review)}</div>`:'<div class="analyst-review empty">No analyst review yet</div>';
    return`<div class="card${selectedIds.has(s.id)?' selected':''}" data-id="${s.id}" style="animation-delay:${Math.min(i*30,300)}ms" onclick="cardClick(event,${s.id})">
      <input type="checkbox" class="card-check" ${selectedIds.has(s.id)?'checked':''} onclick="event.stopPropagation()" onchange="toggle(${s.id})"/>
      <div class="card-header">
        <span class="comp-badge" style="background:${bg};color:${fg};">${esc(s.competitor)}</span>
        <span class="priority-dot" style="background:${pColor}" title="P${s.source_priority||1}"></span>
        <span class="card-date">${date}</span>
        <span class="impact-badge ${impactClass}">${impactLabel}</span>
      </div>
      <div class="card-headline">${esc(s.headline)}</div>
      <div class="card-desc always">${esc(s.description)}</div>
      <div class="card-tags">
        ${s.industry?`<span class="tag industry-tag">${esc(s.industry)}</span>`:''}
        ${(s.topics||[]).map(t=>`<span class="tag topic-tag">${esc(t)}</span>`).join('')}
      </div>
      ${review}
      <div class="knowhub-placeholder" id="kh-${s.id}"></div>
    </div>`;
  }).join('');

  filtered.forEach(s=>{
    if(s.industry&&s.topics&&s.topics.length){
      fetch(`/api/knowhub/lookup?industry=${encodeURIComponent(s.industry)}&topics=${s.topics.map(encodeURIComponent).join(',')}`).then(r=>r.json()).then(kh=>{
        if(kh&&kh.url){const el=document.getElementById('kh-'+s.id);if(el)el.innerHTML=`<a href="${esc(kh.url)}" target="_blank" class="knowhub-link" onclick="event.stopPropagation()">📖 ${esc(kh.label||'Read more at CRC KnowHub')} →</a>`;}
      }).catch(()=>{});
    }
  });
}

function cardClick(event,id){
  if(event.target.classList.contains('knowhub-link'))return;
  const card=document.querySelector(`.card[data-id="${id}"]`);
  if(card)card.classList.toggle('expanded');
}

function toggle(id){
  if(selectedIds.has(id))selectedIds.delete(id);else selectedIds.add(id);
  const card=document.querySelector(`.card[data-id="${id}"]`);
  if(card)card.classList.toggle('selected',selectedIds.has(id));
  document.getElementById('selected-count').textContent=selectedIds.size;
  document.getElementById('export-btn').disabled=selectedIds.size===0;
}

// Count-up animation
function animateCount(elId,target){
  const el=document.getElementById(elId);
  const start=parseInt(el.textContent)||0;
  if(start===target){el.textContent=target;return;}
  const dur=400,t0=performance.now();
  function step(now){
    const p=Math.min((now-t0)/dur,1);
    el.textContent=Math.round(start+(target-start)*p);
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

async function exportPDF(){
  if(selectedIds.size===0)return;
  const filename=document.getElementById('pdf-filename').value.trim()||`ci-pulse-${new Date().toISOString().split('T')[0]}`;
  const btn=document.getElementById('export-btn');
  btn.disabled=true;btn.textContent='Generating...';
  try{
    const r=await fetch('/api/export-pdf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({signal_ids:Array.from(selectedIds),title:'Cognizant CI Pulse',filename:filename})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=filename+'.pdf';a.click();
    URL.revokeObjectURL(url);
  }catch(e){alert('Export failed: '+e.message);}
  finally{btn.disabled=false;btn.textContent='Export PDF';}
}

function esc(s){if(!s)return'';return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function fmtDate(iso){if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
</script>
</body>
</html>
